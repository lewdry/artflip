name: RijksFetch

on:
  schedule:
    # Friday 9 PM Sydney time ≈ 10:00 UTC (adjusts with daylight savings)
    - cron: '0 10 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: pip install requests Pillow

      # 4️⃣ Run Rijksfetch script
      - name: Run Rijksfetch
        run: python scripts/autorijksfetch.py

      # 5️⃣ Commit & push updated data
      - name: Commit updated data
        run: |
          git config user.name "ArtFlip Data Bot"
          git config user.email "hello@artflip.me"
          git add -A public/artworkids.json public/metadata/ public/images/ public/thumbs/ scripts/
          if ! git diff --cached --quiet; then
            git commit -m "Automated Rijks data update $(date +'%Y-%m-%d')"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
          else
            echo "No changes to commit"
          fi
