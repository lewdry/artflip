name: ChicFetch
on:
  schedule:
    # Friday 10 PM Sydney time
    - cron: '0 11 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo 
      - uses: actions/checkout@v4

      # 2️⃣ Set up Python 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      # 3️⃣ Install dependencies
      - name: Install requests
        run: pip install requests

      # 4️⃣ Run Python updater
      - name: Run Python script
        run: python scripts/autochicfetch.py

      # 5️⃣ Commit & push updated data
      - name: Commit updated data
        run: |
          git config user.name "ArtFlip Data Bot"
          git config user.email "hello@artflip.me"
          
          git add -A public/artworkids.json public/metadata/ public/images/ scripts/
          
          if ! git diff --cached --quiet; then
            git commit -m "Automated data update $(date +'%Y-%m-%d')"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
